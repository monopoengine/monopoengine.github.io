let currentQuery = '';
let currentTab = 'web';

function getData(query) {
  return DATA[query.trim().toLowerCase()] || null;
}

function renderWeb(query) {
  const d = getData(query);
  const el = document.getElementById('tab-web');
  el.innerHTML = '';
  if (d && d.secret) {
    const s = document.createElement('div');
    s.className = 'secret-result';
    s.innerHTML = `<div class="secret-glow"></div><div class="secret-badge">特別な結果</div>
      <div class="result-url"><span class="result-url-favicon">★</span><span class="result-domain">${d.secret.url.split('/')[0]}</span><span class="result-path"> › ${d.secret.url.split('/').slice(1).join(' › ')}</span></div>
      <a class="result-title">${d.secret.title}</a><div class="result-desc">${d.secret.desc}</div>`;
    el.appendChild(s);
  }
  const items = d ? d.web : DEFAULT.web;
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'result-item';
    const domain = item.url.split('/')[0];
    const path = item.url.split('/').slice(1).join(' › ');
    div.innerHTML = `<div class="result-url"><span class="result-url-favicon" style="background:#e8f0fe;color:#1a73e8;font-size:9px;">W</span><span class="result-domain">${domain}</span>${path ? `<span class="result-path"> › ${path}</span>` : ''}</div>
      <a class="result-title">${item.title}</a><div class="result-desc">${item.desc}</div>`;
    el.appendChild(div);
  });
}

function renderImages(query) {
  const d = getData(query);
  const el = document.getElementById('tab-images');

  const grid = document.createElement('div');
  grid.className = 'images-grid';
  if (d && d.images && d.images.secret) {
    const s = document.createElement('div');
    s.className = 'img-item secret-img-item';
    s.style.background = d.images.secret.bg;
    s.innerHTML = `<div class="secret-img-badge">SECRET</div><div class="img-placeholder">${d.images.secret.emoji}</div><div class="img-overlay" style="opacity:1"><span class="img-label">${d.images.secret.label}</span></div>`;
    grid.appendChild(s);
  }
  const items = d ? d.images.items : DEFAULT.images;
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'img-item';
    div.style.background = item.bg;
    div.innerHTML = `<div class="img-placeholder">${item.emoji}</div><div class="img-overlay"><span class="img-label">${item.label}</span></div>`;
    grid.appendChild(div);
  });
  el.appendChild(grid);
}

function renderMaps(query) {
  const d = getData(query);
  const el = document.getElementById('tab-maps');
  el.innerHTML = '';

  const mapArea = document.createElement('div');
  mapArea.className = 'map-area';
  mapArea.style.background = '#e8eaed';

  const svg = `<svg class="map-grid" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#9aa0a6" stroke-width="0.5"/></pattern></defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
    <rect x="10%" y="20%" width="30%" height="15%" rx="4" fill="#d0d5db" opacity="0.7"/>
    <rect x="50%" y="30%" width="25%" height="25%" rx="4" fill="#d0d5db" opacity="0.5"/>
    <rect x="20%" y="60%" width="40%" height="10%" rx="4" fill="#d0d5db" opacity="0.4"/>
    <line x1="0" y1="50%" x2="100%" y2="50%" stroke="#b0b8c4" stroke-width="2" opacity="0.6"/>
    <line x1="40%" y1="0" x2="40%" y2="100%" stroke="#b0b8c4" stroke-width="1.5" opacity="0.5"/>
  </svg>`;
  mapArea.innerHTML = svg;

  const allMapItems = [];
  if (d && d.maps && d.maps.secret) allMapItems.push({ ...d.maps.secret, isSecret: true });
  const pinItems = d ? d.maps.items : DEFAULT.maps;
  pinItems.forEach(i => allMapItems.push(i));

  allMapItems.forEach(item => {
    const pin = document.createElement('div');
    pin.className = 'map-pin' + (item.isSecret ? ' secret' : '');
    pin.style.left = item.x;
    pin.style.top = item.y;
    pin.textContent = item.isSecret ? '🔵' : (item.emoji || '📍');
    mapArea.appendChild(pin);
  });

  el.appendChild(mapArea);

  const list = document.createElement('div');
  list.className = 'map-results';

  if (d && d.maps && d.maps.secret) {
    const s = d.maps.secret;
    const div = document.createElement('div');
    div.className = 'map-result-item secret-map-item';
    div.innerHTML = `<div class="map-icon" style="background:#e8f0fe">🔵</div>
      <div class="map-info"><h4>${s.label}</h4><p>${s.address}</p><p style="color:#1a73e8;font-size:12px">${s.note}</p></div>`;
    list.appendChild(div);
  }
  pinItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'map-result-item';
    div.innerHTML = `<div class="map-icon" style="background:#f0f4ff">${item.emoji || '📍'}</div>
      <div class="map-info"><h4>${item.label}</h4><p>${item.address}</p>${item.rating ? `<p>${item.rating}</p>` : ''}</div>`;
    list.appendChild(div);
  });
  el.appendChild(list);
}

function renderAll(query) {
  renderWeb(query);
  renderImages(query);
  renderNews(query);
  renderVideos(query);
  renderMaps(query);
  const d = getData(query);
  const total = d ? (1234567 + Math.floor(Math.random()*1000)) : 23;
  const t = (Math.random() * 0.4 + 0.2).toFixed(1);
  document.getElementById('results-count').textContent = `約 ${total.toLocaleString()} 件 (${t} 秒)`;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.toggle('active', el.id === 'tab-' + tab);
  });
}

function doSearch(query) {
  if (!query.trim()) return;
  currentQuery = query;
  document.getElementById('home').style.display = 'none';
  const r = document.getElementById('results');
  r.style.display = 'flex';
  document.getElementById('results-input').value = query;
  switchTab('web');
  renderAll(query);
}

document.getElementById('home-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(e.target.value); });
document.getElementById('home-search-btn').addEventListener('click', () => { doSearch(document.getElementById('home-input').value); });
document.getElementById('results-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(e.target.value); });
document.getElementById('logo-back').addEventListener('click', () => {
  document.getElementById('results').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
  document.getElementById('home-input').value = '';
});
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});
